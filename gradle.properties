kotlin.code.style=official
kotlin.daemon.jvmargs=-Xmx5120M

org.gradle.jvmargs=-Xmx3072M -Dfile.encoding=UTF-8
org.gradle.parallel=true
# Works for :server (native) and composeApp JVM/WasmJS. The :androidApp APK build must add
# --no-configuration-cache: AGP's androidJdkImage jlink transform is incompatible with GraalVM
# (jlink needs jdk.internal.vm.ci, see oracle/graal#7064) and fails during cc store.
org.gradle.configuration-cache=true

android.nonTransitiveRClass=true
android.useAndroidX=true
