# HTTP server
quarkus.http.port=8080
quarkus.http.host=0.0.0.0

# Public origin of this app (HTTPS domain in production). Used as the OAuth issuer / authorization
# server base in the metadata OAuthMetadataResource serves to MCP clients.
app.public-url=${APP_PUBLIC_URL:http://localhost:8080}

# REST JSON serialization via kotlinx-serialization
quarkus.rest.jackson.fail-on-unknown-properties=false

# Philips Hue Remote API REST client (authenticated lights/groups/sensors calls).
# OAuth2 token + bridge-linking calls use a JDK HttpClient inside HueRemoteClient.
quarkus.rest-client.hue-api.url=https://api.meethue.com

# SQLite datasource (Agroal). JDBC URL points at DATABASE_PATH (default data/hue.db).
quarkus.datasource.db-kind=other
quarkus.datasource.jdbc.driver=org.sqlite.JDBC
quarkus.datasource.jdbc.url=jdbc:sqlite:${DATABASE_PATH:data/hue.db}

# Path consumed directly by the raw-JDBC SettingsStore (key/value runtime settings).
database.path=${DATABASE_PATH:data/hue.db}

# OIDC resource server (validates Hydra-issued JWT access tokens on /mcp).
#
# Topology (see Caddyfile.example): MCP clients (claude.ai) must see the authorization server on the
# SAME origin as /mcp, so Caddy path-routes the OAuth endpoints (/oauth2/*, /.well-known/jwks.json)
# to Hydra under the app's public domain, while the app serves the OAuth metadata. The token issuer
# (what tokens carry, what clients discover) is therefore the app's PUBLIC origin (APP_PUBLIC_URL).
#
# The app validates tokens by reading Hydra's JWKS over the INTERNAL Docker network. Discovery is
# disabled so the app never resolves Hydra's public (Caddy-routed) URLs at startup; jwks-path is read
# directly from HYDRA_INTERNAL_URL. Hydra issues JWT access tokens (STRATEGIES_ACCESS_TOKEN=jwt), so
# validation is a local signature/issuer check — no introspection round-trip.
quarkus.oidc.auth-server-url=${HYDRA_INTERNAL_URL:http://localhost:4444}
quarkus.oidc.discovery-enabled=false
quarkus.oidc.jwks-path=/.well-known/jwks.json
quarkus.oidc.application-type=service
quarkus.oidc.token.issuer=${APP_PUBLIC_URL:http://localhost:8080}
quarkus.oidc.tenant-enabled=true

# RFC 9728 protected-resource metadata: served at /.well-known/oauth-protected-resource and pointed
# to by the `WWW-Authenticate: Bearer resource_metadata="…"` header on /mcp 401, so MCP clients can
# discover the authorization server (the app's public origin). The RFC 8414 authorization-server
# metadata it references is served by OAuthMetadataResource (Hydra advertises neither a
# registration_endpoint nor an oauth-authorization-server document).
quarkus.oidc.resource-metadata.enabled=true
quarkus.oidc.resource-metadata.authorization-server=${APP_PUBLIC_URL:http://localhost:8080}

# Honor Caddy's X-Forwarded-Proto/Host so the app builds correct https://<public-host> URLs in the
# OAuth metadata and the resource_metadata challenge.
quarkus.http.proxy.proxy-address-forwarding=true
quarkus.http.proxy.enable-forwarded-host=true

# Lazy (non-proactive) auth: only run the OIDC/Hydra bearer mechanism where a path actually
# requires it (/mcp). With proactive auth (the default), Quarkus eagerly validates ANY request
# carrying an `Authorization: Bearer` token even on `permit` paths — so the SPA session JWT (our
# HS256 token, validated by hand in AuthVerifier) was rejected by OIDC as an invalid Hydra token,
# making every authenticated /api write 401 ("session expires instantly"). The two bearer schemes
# (SPA session JWT vs Hydra/MCP OAuth) must not collide.
quarkus.http.auth.proactive=false

# Protect only the MCP endpoint with the bearer token; everything else (SPA, /api password auth,
# Hydra login/consent provider, OAuth metadata under /.well-known/*) stays anonymous-accessible.
quarkus.http.auth.permission.mcp.paths=/mcp,/mcp/*
quarkus.http.auth.permission.mcp.policy=authenticated
quarkus.http.auth.permission.public.paths=/login,/consent,/api/*,/.well-known/*
quarkus.http.auth.permission.public.policy=permit

# Hydra admin API REST client (login/consent accept). Internal-only URL via env.
quarkus.rest-client.hydra-admin.url=${HYDRA_ADMIN_URL:http://localhost:4445}

# Logging (replaces logback.xml)
quarkus.log.level=INFO
quarkus.log.category."io.github.commandertvis.huemanager".level=INFO
quarkus.log.console.format=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5p [%c{2.}] (%t) %s%e%n
