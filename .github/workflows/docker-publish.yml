name: Docker Build and Publish

on:
  push:
    branches: [ "master" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long
            type=raw,value=latest

      # Builds the GraalVM native image + Wasm SPA inside the multi-stage Dockerfile.
      # The native compile is memory/CPU heavy (several minutes); GHA layer cache keeps
      # the dependency-resolution layers warm across runs.
      - name: Build and push native image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_COMMIT=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Boots the freshly-built native image (with a throwaway in-memory Hydra so the OIDC proxy starts)
  # and asserts the JSON paths return 401/200/401 — never 500. Catches native-only serialization
  # regressions before deploy: update.sh deploys only when this workflow concludes 'success'.
  smoke-test:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Native smoke test (auth + error paths)
        run: |
          set -euo pipefail
          IMG="ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]'):sha-${{ github.sha }}"
          docker pull "$IMG"
          docker network create huesmoke

          docker run -d --name hydra --network huesmoke \
            -e DSN=memory \
            -e SECRETS_SYSTEM=smoke-system-secret-0123456789abcdef \
            -e URLS_SELF_ISSUER=http://localhost:8080 \
            -e OIDC_DYNAMIC_CLIENT_REGISTRATION_ENABLED=true \
            oryd/hydra:v2.2.0 serve all --dev
          echo "Waiting for Hydra..."
          for _ in $(seq 1 20); do
            docker run --rm --network huesmoke curlimages/curl:latest -sf http://hydra:4444/health/ready >/dev/null 2>&1 && break
            sleep 2
          done

          PWHASH=$(printf 'smoke' | sha256sum | cut -d' ' -f1)
          docker run -d --name app --network huesmoke -p 8080:8080 \
            -e HUE_PASSWORD_HASH="$PWHASH" \
            -e HUE_JWT_SECRET=smoke-jwt-secret-at-least-32-bytes-long \
            -e HUE_REGION=52.5,13.4 -e HUE_PSEUDO_SUNSET=21:05 -e HUE_TIMEZONE=UTC \
            -e HUE_CLIENT_ID=dummy -e HUE_CLIENT_SECRET=dummy -e HUE_APP_ID=dummy \
            -e HUE_REDIRECT_URI=https://example.com/cb \
            -e APP_PUBLIC_URL=http://localhost:8080 \
            -e HYDRA_INTERNAL_URL=http://hydra:4444 -e HYDRA_ADMIN_URL=http://hydra:4445 \
            -e DATABASE_PATH=/app/data/hue.db \
            "$IMG"

          echo "Waiting for app..."
          code=000
          for _ in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8080/api/status || true)
            [ "$code" = "200" ] && break
            sleep 2
          done
          if [ "$code" != "200" ]; then echo "::error::app did not become healthy"; docker logs app; exit 1; fi

          fail=0
          check() {
            local name=$1 exp=$2; shift 2
            local got; got=$(curl -s -o /dev/null -w '%{http_code}' "$@")
            echo "$name -> HTTP $got (expected $exp)"
            [ "$got" = "$exp" ] || { echo "::error::$name returned $got, expected $exp"; fail=1; }
          }
          check "wrong-password"   401 -X POST http://localhost:8080/api/auth      -H 'Content-Type: application/json' -d '{"password":"nope"}'
          check "correct-password" 200 -X POST http://localhost:8080/api/auth      -H 'Content-Type: application/json' -d '{"password":"smoke"}'
          check "unauth-write"     401 -X PUT  http://localhost:8080/api/lamps/all -H 'Content-Type: application/json' -d '{"on":true}'
          # `link` is a suspend resource method returning a @Serializable GenericResponse; its erased
          # signature hides the return type from Quarkus' build-time scan, so the serializer must be
          # registered explicitly or native 500s here (unlinked bridge → "Not authenticated", 200).
          check "hue-link-serialize" 200 -X POST http://localhost:8080/api/hue/link

          # An authed /api write with the SPA session JWT must reach AuthVerifier and succeed — NOT be
          # eaten by the OIDC/Hydra bearer mechanism. Proactive auth (the default) would 401 here even
          # though /api/* is `permit`, because OIDC tries to validate our HS256 token as a Hydra JWT.
          TOKEN=$(curl -s -X POST http://localhost:8080/api/auth -H 'Content-Type: application/json' -d '{"password":"smoke"}' | sed -n 's/.*"token":"\([^"]*\)".*/\1/p')
          [ -n "$TOKEN" ] || { echo "::error::could not obtain session token"; fail=1; }
          check "authed-write"     200 -X PUT  http://localhost:8080/api/settings  -H "Authorization: Bearer $TOKEN" -H 'Content-Type: application/json' -d '{"pseudoSunset":"21:05"}'

          # MCP OAuth discovery surface (claude.ai): /mcp must 401 with a resource_metadata pointer,
          # and the app must serve RFC 9728 protected-resource + RFC 8414 authorization-server metadata
          # (the latter carries the registration_endpoint Hydra itself never advertises).
          check "mcp-protected"    200 http://localhost:8080/.well-known/oauth-protected-resource
          check "mcp-as-metadata"  200 http://localhost:8080/.well-known/oauth-authorization-server
          chal=$(curl -s -D - -o /dev/null -X POST http://localhost:8080/mcp -d '{}' | grep -i 'www-authenticate' || true)
          echo "$chal" | grep -q 'resource_metadata=' || { echo "::error::/mcp 401 missing resource_metadata pointer ($chal)"; fail=1; }
          curl -s http://localhost:8080/.well-known/oauth-authorization-server | grep -q 'registration_endpoint' \
            || { echo "::error::authorization-server metadata missing registration_endpoint"; fail=1; }

          if [ "$fail" != "0" ]; then echo "=== app logs ==="; docker logs app | tail -50; exit 1; fi
          echo "Native smoke test passed."

      - name: Cleanup
        if: always()
        run: |
          docker rm -f app hydra >/dev/null 2>&1 || true
          docker network rm huesmoke >/dev/null 2>&1 || true
