services:
  hue-manager:
    # For local development: build from source
    build: .

    # For production: use pre-built image from GHCR
    # image: ghcr.io/commandertvis/hue-manager:sha-<commit-hash>

    container_name: hue-manager
    restart: unless-stopped

    # Local development: expose port directly
    ports:
      - "8080:8080"

    # Production: use internal exposure only (behind Caddy)
    # expose:
    #   - "8080"

    env_file:
      - .env

    # Production: also mount .env at root for Docker environment
    # volumes:
    #   - ./.env:/.env

    environment:
      - TZ=Europe/Berlin

    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    # Local development: simple setup without network
    # Production: use bridge network with Caddy
    # networks:
    #   - hue-network

  # Production only: Caddy reverse proxy for HTTPS
  # caddy:
  #   image: caddy:latest
  #   container_name: hue-caddy
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./Caddyfile:/etc/caddy/Caddyfile
  #     - caddy_data:/data
  #     - caddy_config:/config
  #   networks:
  #     - hue-network
