services:
  hue-manager:
    # Default: pulls from GHCR. Use --build to rebuild locally.
    # Set APP_TAG env var to override version (default: latest)
    image: ghcr.io/commandertvis/hue-manager:${APP_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile

    container_name: hue-manager
    restart: unless-stopped

    # Local development: expose port directly
    ports:
      - "8080:8080"

    # Production: use internal exposure only (behind Caddy)
    # expose:
    #   - "8080"

    env_file:
      - .env

    # Production: also mount .env at root for Docker environment
    volumes:
      - ./sessions.json:/app/sessions.json
      # Persistent SQLite database for runtime settings (on/off state, schedule preferences).
      # Named volume so the non-root container user keeps write access.
      - hue-data:/app/data
    #   - ./.env:/.env

    environment:
      - TZ=Europe/Berlin
      - DATABASE_PATH=/app/data/hue.db

    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:8080/api/status",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    # Local development: simple setup without network
    # Production: use bridge network with Caddy
    # networks:
    #   - hue-network

  # Production only: Caddy reverse proxy for HTTPS
  # caddy:
  #   image: caddy:latest
  #   container_name: hue-caddy
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./Caddyfile:/etc/caddy/Caddyfile
  #     - caddy_data:/data
  #     - caddy_config:/config
  #   networks:
  #     - hue-network
  #   depends_on:
  #     - hue-manager

# Production only: network for service communication
# networks:
#   hue-network:
#     driver: bridge

volumes:
  # Persistent runtime settings (SQLite). Survives container rebuilds/restarts.
  hue-data:
  # Production only: Caddy persistent storage
  # caddy_data:
  # caddy_config:
