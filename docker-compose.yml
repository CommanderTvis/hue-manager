# Development: builds the server image from source (multi-stage native Dockerfile).
#   docker compose up --build
# For a registry-image deployment instead, use docker-compose.prod.yml.
services:
  hue-manager:
    build:
      context: .
      dockerfile: Dockerfile
    image: hue-manager:dev
    container_name: hue-manager
    restart: unless-stopped

    ports:
      - "8080:8080"

    env_file:
      - .env

    volumes:
      # Persistent SQLite DB for runtime settings (named volume → non-root container keeps write access).
      - hue-data:/app/data

    environment:
      - TZ=Europe/Berlin
      - DATABASE_PATH=/app/data/hue.db
      # Hydra public issuer URL as seen by the browser/MCP client.
      - HYDRA_ISSUER_URL=${HYDRA_ISSUER_URL:-http://localhost:4444}
      # Hydra admin API (internal only) used by the login/consent provider.
      - HYDRA_ADMIN_URL=http://hydra:4445

    depends_on:
      hydra:
        condition: service_started

    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Ory Hydra: OAuth2 authorization server for MCP (tokens, refresh, DCR, discovery).
  # Delegates login & consent to the app's /login and /consent endpoints. SQLite-backed.
  hydra-migrate:
    image: oryd/hydra:v2.2.0
    container_name: hue-hydra-migrate
    command: migrate sql -e --yes
    environment:
      - DSN=sqlite:///var/lib/sqlite/hydra.db?_fk=true&mode=rwc
    volumes:
      - hydra-data:/var/lib/sqlite
    restart: "no"

  hydra:
    image: oryd/hydra:v2.2.0
    container_name: hue-hydra
    command: serve all --dev   # --dev relaxes HTTPS; fine for local dev
    restart: unless-stopped
    depends_on:
      hydra-migrate:
        condition: service_completed_successfully
    ports:
      - "4444:4444"
      - "4445:4445"
    environment:
      - DSN=sqlite:///var/lib/sqlite/hydra.db?_fk=true&mode=rwc
      - URLS_SELF_ISSUER=${HYDRA_ISSUER_URL:-http://localhost:4444}
      - URLS_LOGIN=${APP_PUBLIC_URL:-http://localhost:8080}/login
      - URLS_CONSENT=${APP_PUBLIC_URL:-http://localhost:8080}/consent
      - SECRETS_SYSTEM=${HYDRA_SECRETS_SYSTEM:?HYDRA_SECRETS_SYSTEM is required}
      - OAUTH2_PKCE_ENFORCED_FOR_PUBLIC_CLIENTS=true
      - STRATEGIES_ACCESS_TOKEN=jwt
    volumes:
      - hydra-data:/var/lib/sqlite

volumes:
  hue-data:
  hydra-data:
